<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>coroom — 회의실 예약</title>

<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#3563e9" />
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="coroom" />
<meta name="mobile-web-app-capable" content="yes" />

<link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- 오프라인 안내 -->
<div id="offlineBanner" class="status-banner offline-banner hidden" role="status">
  <span>📶 오프라인 상태입니다 — 마지막으로 불러온 정보를 보여드리고 있어요.</span>
</div>

<!-- 홈 화면에 추가 안내 -->
<div id="installBanner" class="status-banner install-banner hidden" role="status">
  <span id="installBannerText"></span>
  <div class="install-banner-actions">
    <button type="button" id="installActionBtn" class="btn btn-primary btn-small hidden">설치</button>
    <button type="button" id="installDismissBtn" class="icon-btn btn-small" aria-label="닫기">✕</button>
  </div>
</div>

<!-- ===================== 메인 앱 ===================== -->
<div id="appSection" class="app-wrap">

  <header class="topbar">
    <h1 class="logo">coroom</h1>

    <div class="date-nav">
      <button type="button" id="prevDayBtn" class="icon-btn" title="이전 날">‹</button>
      <input type="date" id="datePicker" />
      <span id="dateLabel" class="date-label"></span>
      <button type="button" id="nextDayBtn" class="icon-btn" title="다음 날">›</button>
      <button type="button" id="todayBtn" class="btn btn-ghost">오늘</button>
    </div>
  </header>

  <main>
    <!-- 대시보드: 회의실 x 시간 그리드 -->
    <section id="dashboardView" class="view">
      <div id="loadingIndicator" class="loading-indicator hidden">불러오는 중…</div>
      <div id="gridWrap" class="grid-wrap">
        <div id="grid" class="grid"></div>
      </div>
      <p class="legend">빈 칸을 클릭하면 예약할 수 있습니다. 예약된 칸을 클릭하면 상세 정보를 볼 수 있습니다.</p>
    </section>
  </main>
</div>

<!-- ===================== 예약 생성 모달 ===================== -->
<div id="reservationModalOverlay" class="modal-overlay hidden">
  <div class="modal">
    <h2>회의실 예약</h2>
    <form id="reservationForm">
      <div class="form-row">
        <label>회의실</label>
        <input type="text" id="resRoomName" readonly />
      </div>
      <div class="form-row">
        <label>날짜</label>
        <input type="text" id="resDate" readonly />
      </div>
      <div class="form-row two-col">
        <div>
          <label>시작 시간</label>
          <select id="resStartTime"></select>
        </div>
        <div>
          <label>종료 시간</label>
          <select id="resEndTime"></select>
        </div>
      </div>
      <div class="form-row">
        <label>회의 제목 <span class="required">*</span></label>
        <input type="text" id="resTitle" required placeholder="예: 주간 팀 회의" />
      </div>
      <div class="form-row">
        <label>부서 <span class="required">*</span></label>
        <input type="text" id="resDepartment" required placeholder="예: 마케팅팀" />
      </div>
      <div class="form-row">
        <label>예약자 <span class="required">*</span></label>
        <input type="text" id="resReserverName" required placeholder="예: 홍길동" />
      </div>
      <p id="reservationFormError" class="form-error hidden"></p>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" id="reservationCancelBtn">취소</button>
        <button type="submit" class="btn btn-primary" id="reservationSubmitBtn">예약하기</button>
      </div>
    </form>
  </div>
</div>

<!-- ===================== 예약 상세 모달 ===================== -->
<div id="detailModalOverlay" class="modal-overlay hidden">
  <div class="modal">
    <h2>예약 상세</h2>
    <dl class="detail-list">
      <dt>회의실</dt><dd id="detailRoomName"></dd>
      <dt>제목</dt><dd id="detailTitle"></dd>
      <dt>예약자</dt><dd id="detailReserver"></dd>
      <dt>부서</dt><dd id="detailDepartment"></dd>
      <dt>날짜</dt><dd id="detailDate"></dd>
      <dt>시간</dt><dd id="detailTime"></dd>
      <dt>상태</dt><dd id="detailStatus"></dd>
    </dl>
    <p id="detailError" class="form-error hidden"></p>
    <div class="modal-actions">
      <button type="button" class="btn btn-ghost" id="detailCloseBtn">닫기</button>
      <button type="button" class="btn btn-danger hidden" id="detailCancelReservationBtn">예약 취소</button>
    </div>
  </div>
</div>

<!-- 토스트 알림 -->
<div id="toastContainer" class="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="supabaseClient.js"></script>
<script src="app.js"></script>
<script src="pwa.js"></script>
</body>
</html>
